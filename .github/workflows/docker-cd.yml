name: CI-CD Docker

on:
    push:

permissions:
    contents: read
    packages: write

jobs:
    buld-test-push:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Run tests (CI)
          run: |
            docker build -t my-python-app .
            docker run my-python-app

        - name: Log in to Github Container Registry
          run : echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --pasword-stdin

        - name: Build Docker Image
          run: docker build -t ghcr.io/${{ github.repository }}/my-python-app:latest .

        - name: Push Docker Image
          run: docker push ghcr.io/${{ github.repository }}/my-python-app:latest