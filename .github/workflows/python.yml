name: Python CI

on:
    push:

jobs:
    test-python:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Run Python script
          run: python main.py

        - name: Debug files
          run: ls -R
         